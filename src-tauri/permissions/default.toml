"$schema" = "../gen/schemas/desktop-schema.json"

[[permission]]
identifier = "allow-create-terminal"
description = "Allows creating a new terminal session"
commands.allow = ["create_terminal"]

[[permission]]
identifier = "allow-write-terminal"
description = "Allows writing data to a terminal session"
commands.allow = ["write_terminal"]

[[permission]]
identifier = "allow-resize-terminal"
description = "Allows resizing a terminal session"
commands.allow = ["resize_terminal"]

[[permission]]
identifier = "allow-kill-terminal"
description = "Allows killing a terminal session"
commands.allow = ["kill_terminal"]

[[permission]]
identifier = "allow-engine-status"
description = "Allows checking gateway engine status"
commands.allow = ["engine_status"]

[[permission]]
identifier = "allow-engine-start"
description = "Allows starting the gateway engine"
commands.allow = ["engine_start"]

[[permission]]
identifier = "allow-engine-stop"
description = "Allows stopping the gateway engine"
commands.allow = ["engine_stop"]

[[permission]]
identifier = "allow-engine-restart"
description = "Allows restarting the gateway engine"
commands.allow = ["engine_restart"]

[[permission]]
identifier = "allow-engine-gateway-config"
description = "Allows reading the gateway configuration"
commands.allow = ["engine_gateway_config"]

[[permission]]
identifier = "allow-local-read-tree"
description = "Allows reading the file tree of a local directory"
commands.allow = ["local_read_tree"]

[[permission]]
identifier = "allow-local-read-file"
description = "Allows reading a local file as text"
commands.allow = ["local_read_file"]

[[permission]]
identifier = "allow-local-read-file-base64"
description = "Allows reading a local file as base64"
commands.allow = ["local_read_file_base64"]

[[permission]]
identifier = "allow-local-write-file"
description = "Allows writing content to a local file"
commands.allow = ["local_write_file"]

[[permission]]
identifier = "allow-local-git-info"
description = "Allows reading git repo info (branch, status)"
commands.allow = ["local_git_info"]

[[permission]]
identifier = "allow-local-git-diff"
description = "Allows reading git diff for a file"
commands.allow = ["local_git_diff"]

[[permission]]
identifier = "allow-local-git-commit"
description = "Allows committing files via git"
commands.allow = ["local_git_commit"]

[[permission]]
identifier = "allow-local-git-branches"
description = "Allows listing git branches"
commands.allow = ["local_git_branches"]

[[permission]]
identifier = "allow-local-git-checkout"
description = "Allows checking out a git branch"
commands.allow = ["local_git_checkout"]

[[permission]]
identifier = "allow-local-git-add"
description = "Allows staging files via git add"
commands.allow = ["local_git_add"]

[[permission]]
identifier = "allow-local-git-unstage"
description = "Allows unstaging files via git reset"
commands.allow = ["local_git_unstage"]

[[permission]]
identifier = "allow-local-git-undo-commit"
description = "Allows undoing the last commit via git reset --soft"
commands.allow = ["local_git_undo_commit"]

[[permission]]
identifier = "allow-local-git-remote-url"
description = "Allows reading the git remote origin URL"
commands.allow = ["local_git_remote_url"]

[[permission]]
identifier = "allow-local-git-push"
description = "Allows pushing to the git remote"
commands.allow = ["local_git_push"]

[[permission]]
identifier = "allow-local-git-log"
description = "Allows reading git log entries"
commands.allow = ["local_git_log"]

[[permission]]
identifier = "allow-local-git-has-upstream"
description = "Allows checking if a branch has a remote tracking upstream"
commands.allow = ["local_git_has_upstream"]

[[permission]]
identifier = "allow-local-git-ahead-behind"
description = "Allows checking commits ahead/behind remote"
commands.allow = ["local_git_ahead_behind"]

[[permission]]
identifier = "allow-local-delete-path"
description = "Allows deleting a file or directory"
commands.allow = ["local_delete_path"]

[[permission]]
identifier = "allow-local-git-discard"
description = "Allows discarding unstaged changes via git checkout"
commands.allow = ["local_git_discard"]

[[permission]]
identifier = "allow-local-git-discard-staged"
description = "Allows discarding staged changes via git reset + checkout"
commands.allow = ["local_git_discard_staged"]

[[permission]]
identifier = "allow-local-git-save"
description = "Allows git add all, commit, and push in one step"
commands.allow = ["local_git_save"]

[[permission]]
identifier = "allow-local-git-sync"
description = "Allows git pull --rebase then push"
commands.allow = ["local_git_sync"]

[[permission]]
identifier = "allow-local-git-clean-branches"
description = "Allows deleting merged local branches"
commands.allow = ["local_git_clean_branches"]
